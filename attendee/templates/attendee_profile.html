<!doctype html>
<html lang="en">
{% load static %}

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="">
  <meta name="author" content="">
  <link rel="icon" href="{% static 'assets/images/logo.svg' %}">
  <title>EventVista | Attendee | Profile</title>
  <!-- Simple bar CSS -->
  <link rel="stylesheet" href="{% static 'css/simplebar.css' %}">
  <!-- Fonts CSS -->
  <link
    href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100;0,200;0,300;0,400;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <!-- Icons CSS -->
  <link rel="stylesheet" href="{% static 'css/feather.css' %}">
  <!-- Date Range Picker CSS -->
  <link rel="stylesheet" href="{% static 'css/daterangepicker.css' %}">
  <!-- App CSS -->
  <link rel="stylesheet" href="{% static 'css/app-light.css' %}" id="lightTheme">
  <link rel="stylesheet" href="{% static 'css/newcss.css' %}">
</head>

<body class="vertical light">
  <div class="wrapper">
    <nav class="topnav navbar navbar-light">
      <button type="button" class="navbar-toggler text-muted mt-2 p-0 mr-3 collapseSidebar">
        <i class="fe fe-menu navbar-toggler-icon"></i>
      </button>
      <ul class="nav">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle text-muted pr-0" href="#" id="navbarDropdownMenuLink" role="button"
            data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
            <span class="avatar avatar-sm mt-2">
              <img src="{% static 'assets/avatars/face-1.jpg' %}" alt="..." class="avatar-img rounded-circle">
            </span>
          </a>
          <div class="dropdown-menu dropdown-menu-right" aria-labelledby="navbarDropdownMenuLink">
            <a class="dropdown-item" href="/attendee/profile/">Profile</a>
            <a class="dropdown-item" href="/accounts/logout">Log Out</a>

          </div>
        </li>
      </ul>
    </nav>

    <aside class="sidebar-left border-right bg-white shadow" id="leftSidebar" data-simplebar>
      <a href="#" class="btn collapseSidebar toggle-btn d-lg-none text-muted ml-2 mt-3" data-toggle="toggle">
        <i class="fe fe-x"><span class="sr-only"></span></i>
      </a>
      <nav class="vertnav navbar navbar-light">
        <!-- Branding -->
        <div class="w-100 mb-4 d-flex">
          <a class="navbar-brand mx-auto mt-2 flex-fill text-center" href="/attendee/home/">
            <img src="{% static 'assets/images/logo.svg' %}" height="80px" width="80px" alt="Logo">
          </a>
        </div>

        <!-- New Pages Section -->
        <ul class="navbar-nav flex-fill w-100 mb-2">
          <li class="nav-item {% if request.path == '/attendee/home/' %}active{% endif %}">
            <a class="nav-link" href="/attendee/home/">
              <i class="fe fe-home fe-16"></i>
              <span class="ml-3 item-text">Home Page</span>
            </a>
          </li>
          <li class="nav-item {% if request.path == '/attendee/event_history/' %}active{% endif %}">
            <a class="nav-link" href="/attendee/event_history/">
              <i class="fe fe-clock fe-16"></i>
              <span class="ml-3 item-text">Order History</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>



    <main role="main" class="main-content">
      <div class="container-fluid">
        <div class="row justify-content-center">
          <div class="col-12">
            <h2 class="h3 mb-4 page-title">Profile</h2>
            <form action="/attendee/profile/" method="post" enctype="multipart/form-data">
              {% csrf_token %}
              <div class="row mt-5 align-items-center">
                <div class="col-md-3 text-center mb-5">
                  <div class="avatar avatar-xl">
                    <img src="{{ user_details.profile_picture }}" alt="Profile Picture" height="100px" width="100px" class="avatar-img rounded-circle">
                  </div>
                </div>
                <div class="col">
                  <div class="row align-items-center mb-4">
                    <div class="col-md-7">
                      <h4 class="mb-1">{{ user_details.fullname }}</h4>
                    </div>
                  </div>
                </div>
              </div>
              
              <hr class="my-4">
              
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="fullname">Fullname</label>
                  <input type="text" id="fullname" name="fullname" class="form-control" value="{{ user_details.fullname }}">
                </div>
                <div class="form-group col-md-6">
                  <label for="inputEmail4">Email</label>
                  <input type="email" id="inputEmail4" class="form-control" value="{{ user_details.email }}" disabled>
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="inputAddress5">Pincode</label>
                  <input type="text" id="inputAddress5" name="pincode" class="form-control" value="{{ user_details.pincode }}">
                </div>
                <div class="form-group col-md-6">
                  <label for="phoneNumber">Phone Number</label>
                  <input type="text" id="phoneNumber" class="form-control" value="{{ user_details.phone }}" disabled>
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="gender">Gender</label>
                  <select id="gender" name="gender" class="form-control">
                    <option value="male" {% if user_details.gender == 'male' %}selected{% endif %}>Male</option>
                    <option value="female" {% if user_details.gender == 'female' %}selected{% endif %}>Female</option>
                    <option value="other" {% if user_details.gender == 'other' %}selected{% endif %}>Other</option>
                  </select>
                </div>
                <div class="form-group col-md-6">
                  <label for="age">Age</label>
                  <input type="number" id="age" name="age" class="form-control" value="{{ user_details.age }}">
                </div>
              </div>
              
              <div class="form-row mb-4">
                <div class="form-group col-md-12">
                  <label for="profilePicture">Profile Picture</label>
                  <input type="file" id="profilePicture" name="profile_picture" class="form-control-file">
                </div>
              </div>
            
              <div class="text-center">
                <button type="submit" class="btn btn-primary">Save Changes</button>
              </div>
            </form>
            
            
          </div>
        </div>
      </div>


    </main> <!-- main -->
  </div> <!-- .wrapper -->


  <!-- jQuery -->
  <script src="{% static 'js/jquery.min.js' %}"></script>
  <script src="{% static 'js/popper.min.js' %}"></script>
  <script src="{% static 'js/moment.min.js' %}"></script>
  <script src="{% static 'js/bootstrap.min.js' %}"></script>
  <script src="{% static 'js/simplebar.min.js' %}"></script>
  <script src="{% static 'js/daterangepicker.js' %}"></script>
  <script src="{% static 'js/jquery.stickOnScroll.js' %}"></script>
  <script src="{% static 'js/tinycolor-min.js' %}"></script>
  <script src="{% static 'js/config.js' %}"></script>
  <script src="{% static 'js/apps.js' %}"></script>
  <script src="{% static 'js/d3.min.js' %}"></script>
  <script src="{% static 'js/topojson.min.js' %}"></script>
  <script src="{% static 'js/datamaps.all.min.js' %}"></script>
  <script src="{% static 'js/datamaps-zoomto.js' %}"></script>
  <script src="{% static 'js/datamaps.custom.js' %}"></script>
  <script src="{% static 'js/Chart.min.js' %}"></script>
  <script>
    /* defind global options */
    Chart.defaults.global.defaultFontFamily = base.defaultFontFamily;
    Chart.defaults.global.defaultFontColor = colors.mutedColor;
  </script>
  <script src="{% static 'js/gauge.min.js' %}"></script>
  <script src="{% static 'js/jquery.sparkline.min.js' %}"></script>
  <script src="{% static 'js/apexcharts.min.js' %}"></script>
  <script src="{% static 'js/apexcharts.custom.js' %}"></script>
  <script src="{% static 'js/jquery.mask.min.js' %}"></script>
  <script src="{% static 'js/select2.min.js' %}"></script>
  <script src="{% static 'js/jquery.steps.min.js' %}"></script>
  <script src="{% static 'js/jquery.validate.min.js' %}"></script>
  <script src="{% static 'js/jquery.timepicker.js' %}"></script>
  <script src="{% static 'js/dropzone.min.js' %}"></script>
  <script src="{% static 'js/uppy.min.js' %}"></script>
  <script src="{% static 'js/quill.min.js' %}"></script>
  <script src="{% static 'js/dataTables.bootstrap4.min.js' %}"></script>
  <script>
    $('#dataTable-1').DataTable(
      {
        autoWidth: true,
        "lengthMenu": [
          [16, 32, 64, -1],
          [16, 32, 64, "All"]
        ]
      });
  </script>
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-56159088-1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }
    gtag('js', new Date());
    gtag('config', 'UA-56159088-1');
  </script>
  <script>
    $('.select2').select2(
      {
        theme: 'bootstrap4',
      });
    $('.select2-multi').select2(
      {
        multiple: true,
        theme: 'bootstrap4',
      });
    $('.drgpicker').daterangepicker(
      {
        singleDatePicker: true,
        timePicker: false,
        showDropdowns: true,
        locale:
        {
          format: 'MM/DD/YYYY'
        }
      });
    $('.time-input').timepicker(
      {
        'scrollDefault': 'now',
        'zindex': '9999' /* fix modal open */
      });
    /** date range picker */
    if ($('.datetimes').length) {
      $('.datetimes').daterangepicker(
        {
          timePicker: true,
          startDate: moment().startOf('hour'),
          endDate: moment().startOf('hour').add(32, 'hour'),
          locale:
          {
            format: 'M/DD hh:mm A'
          }
        });
    }
    var start = moment().subtract(29, 'days');
    var end = moment();

    function cb(start, end) {
      $('#reportrange span').html(start.format('MMMM D, YYYY') + ' - ' + end.format('MMMM D, YYYY'));
    }
    $('#reportrange').daterangepicker(
      {
        startDate: start,
        endDate: end,
        ranges:
        {
          'Today': [moment(), moment()],
          'Yesterday': [moment().subtract(1, 'days'), moment().subtract(1, 'days')],
          'Last 7 Days': [moment().subtract(6, 'days'), moment()],
          'Last 30 Days': [moment().subtract(29, 'days'), moment()],
          'This Month': [moment().startOf('month'), moment().endOf('month')],
          'Last Month': [moment().subtract(1, 'month').startOf('month'), moment().subtract(1, 'month').endOf('month')]
        }
      }, cb);
    cb(start, end);
    $('.input-placeholder').mask("00/00/0000",
      {
        placeholder: "__/__/____"
      });
    $('.input-zip').mask('00000-000',
      {
        placeholder: "____-___"
      });
    $('.input-money').mask("#.##0,00",
      {
        reverse: true
      });
    $('.input-phoneus').mask('(000) 000-0000');
    $('.input-mixed').mask('AAA 000-S0S');
    $('.input-ip').mask('0ZZ.0ZZ.0ZZ.0ZZ',
      {
        translation:
        {
          'Z':
          {
            pattern: /[0-9]/,
            optional: true
          }
        },
        placeholder: "___.___.___.___"
      });
    // editor
    var editor = document.getElementById('editor');
    if (editor) {
      var toolbarOptions = [
        [
          {
            'font': []
          }],
        [
          {
            'header': [1, 2, 3, 4, 5, 6, false]
          }],
        ['bold', 'italic', 'underline', 'strike'],
        ['blockquote', 'code-block'],
        [
          {
            'header': 1
          },
          {
            'header': 2
          }],
        [
          {
            'list': 'ordered'
          },
          {
            'list': 'bullet'
          }],
        [
          {
            'script': 'sub'
          },
          {
            'script': 'super'
          }],
        [
          {
            'indent': '-1'
          },
          {
            'indent': '+1'
          }], // outdent/indent
        [
          {
            'direction': 'rtl'
          }], // text direction
        [
          {
            'color': []
          },
          {
            'background': []
          }], // dropdown with defaults from theme
        [
          {
            'align': []
          }],
        ['clean'] // remove formatting button
      ];
      var quill = new Quill(editor,
        {
          modules:
          {
            toolbar: toolbarOptions
          },
          theme: 'snow'
        });
    }
    // Example starter JavaScript for disabling form submissions if there are invalid fields
    (function () {
      'use strict';
      window.addEventListener('load', function () {
        // Fetch all the forms we want to apply custom Bootstrap validation styles to
        var forms = document.getElementsByClassName('needs-validation');
        // Loop over them and prevent submission
        var validation = Array.prototype.filter.call(forms, function (form) {
          form.addEventListener('submit', function (event) {
            if (form.checkValidity() === false) {
              event.preventDefault();
              event.stopPropagation();
            }
            form.classList.add('was-validated');
          }, false);
        });
      }, false);
    })();
  </script>

  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-56159088-1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }
    gtag('js', new Date());
    gtag('config', 'UA-56159088-1');
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Get the current page URL
      var currentPage = window.location.pathname.split('/').pop();

      // Get all nav links
      var navLinks = document.querySelectorAll('.navbar-nav .nav-link');

      navLinks.forEach(function (link) {
        // Get the href attribute of the link
        var linkPath = new URL(link.href).pathname.split('/').pop();

        // Check if the href matches the current page URL
        if (linkPath === currentPage) {
          link.classList.add('active');
        }
      });
    });
  </script>
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-56159088-1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }
    gtag('js', new Date());
    gtag('config', 'UA-56159088-1');
  </script>
  <script>
    function toggleSidebar() {
      var sidebar = document.getElementById("sidebar");
      var main = document.getElementById("main");

      if (sidebar.style.width === "250px") {
        sidebar.style.width = "0";
        main.style.marginLeft = "0";
      } else {
        sidebar.style.width = "250px";
        main.style.marginLeft = "250px";
      }
    }
  </script>
</body>

</html>
