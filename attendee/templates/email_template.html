<!doctype html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">
    <title>Your Tickets for [Event Name]</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Play', Helvetica, sans-serif;
            background-color: #12262F;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 600px;
            margin: auto;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .container {
            background-image: url('https://i.postimg.cc/zGxYMJZ5/Registered.png');
            background-color: #12262F;
            background-size: cover;
            background-repeat: no-repeat;
            padding: 20px;
        }

        .header img {
            width: 155px;
            margin: 30px auto;
        }

        .ticket-info {
            background-image: url('https://i.postimg.cc/bNZX40vV/black-bg.png');
            border-radius: 2px;
            border: 7px solid #EB860D;
            margin: 20px auto;
            text-align: center;
            padding: 20px;
        }

        .ticket-info p {
            color: #FFC400;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 20px;
            margin: 10px 0 15px;
        }

        .ticket-number,
        .thank-you {
            background-color: #000;
            color: #fff;
            font-weight: bold;
            text-align: center;
            margin: 20px auto;
            padding: 15px;
            font-size: 30px;
        }

        .thank-you {
            font-size: 25px;
            text-transform: uppercase;
            padding: 8px 0;
        }

        .footer {
            background-color: #000;
            text-align: center;
            padding: 10px;
            color: #fff;
            font-size: 14px;
        }

        .footer a {
            margin: 0 12px;
        }

        .footer p {
            font-size: 11px;
            margin: 5px 0;
        }

        .footer a {
            color: #F48B0E;
            text-decoration: none;
        }

        @media screen and (max-width: 600px) {
            .container {
                padding: 10px;
            }

            .ticket-info,
            .ticket-number,
            .thank-you {
                margin: 20px auto;
                padding: 10px;
                width: 100%;
            }

            .ticket-number,
            .thank-you {
                font-size: 20px;
            }

            .footer a {
                margin: 0 5px;
                width: 20px;
            }

            .footer p {
                font-size: 10px;
            }
        }
    </style>
</head>

<body>
    <table class="container">
        <thead>
            <tr>
                <th colspan="2" class="header">
                    <img src="https://i.postimg.cc/SsQ4tY0X/white-logo.png" alt="LimitLess VR Logo">
                </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="ticket-info">
                    <p>quick pass</p>
                    <img src='https://i.postimg.cc/fWx5yJrW/qr-Code.png' alt='QR Code' />
                </td>
            </tr>
            <tr>
                <td class="ticket-number">67293</td>
            </tr>
            <tr>
                <td class="thank-you">thank you!</td>
            </tr>
            <tr class="footer">
                <td>
                    <a href='https://www.facebook.com/WeAreLimitlessVR/'>
                        <img src="https://i.postimg.cc/1zd4xZSc/facebook-logo.png" alt="Facebook Logo">
                    </a>
                    <a href='https://www.instagram.com/wearelimitlessvr/'>
                        <img src="https://i.postimg.cc/RV0rtJKh/instagram-logo.png" alt="Instagram Logo">
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
