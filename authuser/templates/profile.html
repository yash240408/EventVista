<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 80%;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
        }
        .profile-details {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .profile-details p {
            font-size: 18px;
            margin: 5px 0;
        }
        .profile-details img {
            border-radius: 50%;
            max-width: 150px;
            margin-top: 20px;
        }
        .profile-picture {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Profile</h1>
        <div class="profile-details">
            <p><strong>Full Name:</strong> {{ user_details.fullname }}</p>
            <p><strong>Email:</strong> {{ user_details.email }}</p>
            <p><strong>Phone:</strong> {{ user_details.phone }}</p>
            <p><strong>Role:</strong> {{ user_details.role }}</p>
            {% if user_details.profile_picture %}
            <div class="profile-picture">
                <p><strong>Profile Picture:</strong></p>
                <img src="{{ user_details.profile_picture }}" alt="Profile Picture">
            </div>
            {% else %}
            <p>No profile picture uploaded.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
