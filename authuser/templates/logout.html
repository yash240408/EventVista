<!DOCTYPE html>
<html>
{% load static %}

<head>
    <!-- Basic Page Info -->
    <meta charset="utf-8">
    <title>EventVista | Logout</title>
    <!-- Site favicon -->
    <link rel="icon" href="{% static 'assets/images/logo.svg' %}">
    <!-- Mobile Specific Metas -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" type="text/css" href=" {% static 'vendors/styles/core.css' %} ">
    <link rel="stylesheet" type="text/css" href=" {% static 'vendors/styles/icon-font.min.css' %} ">
    <link rel="stylesheet" type="text/css"
        href=" {% static 'src/plugins/datatables/css/dataTables.bootstrap4.min.css' %} ">
    <link rel="stylesheet" type="text/css"
        href=" {% static 'src/plugins/datatables/css/responsive.bootstrap4.min.css' %} ">
    <link rel="stylesheet" type="text/css" href=" {% static 'vendors/styles/style.css' %} ">

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-119386393-1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'UA-119386393-1');
    </script>

    <style>
        .txtcen {
            text-align: center;
        }
    </style>

    <script>
        var seconds = 10;
        function displayseconds() {
            seconds -= 1;
            document.getElementById("seconddisplay").innerHTML = "You are being redirected to login page in " + seconds + " seconds ....";
        }
        setInterval(displayseconds, 1000);

        function redirectpage() {
            window.location = "/accounts/login/";
        }
        setTimeout('redirectpage()', 10000)
    </script>
    <script type="text/javascript">
        history.pushState(null, null, location.href);
        history.back();
        history.forward();
        window.onpopstate = function () { history.go(1); };
    </script>
</head>

<body>
    <div class="pre-loader">
        <div class="pre-loader-box">

            <div class="main-container">
                <div class="pd-ltr-20">
                    <div class="card-box pd-20 height-100-p mb-30">
                        <div class="row align-items-center">
                            <div class="col-md-4">
                                <img src=" {% static 'vendors/images/load2.gif' %} " alt="">
                            </div>
                            <div class="col-md-8">
                                <div class="dropdown-divider"></div>
                                <h4 class="font-28 weight-600 mb-10 text-capitalize txtcen">
                                    You are now being logged out
                                    <img class='txtcen' src=" {% static 'vendors\images\load.gif' %} " height="35px"
                                        width="40px" />
                                </h4>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="pd-ltr-20">
            <div class="card-box pd-20 height-100-p mb-30">
                <div class="row align-items-center">
                    <div class="col-md-4">
                        <img src=" {% static 'vendors/images/gfgfhff.png' %} " alt="">
                    </div>
                    <div class="col-md-8">
                        <div class="dropdown-divider"></div>
                        <h4 class="font-28 weight-600 mb-10 text-capitalize txtcen">
                            You are now being logged out <img src=" {% static 'vendors\images\load2.gif' %} "
                                height="30px" width="30px" />
                        </h4>
                        <h5 class="font-20 weight-600 mb-10 text-capitalize txtcen">
                            Have A Great Day
                        </h5>
                        <p class="font-18 txtcen">You have been Logout Successfully</p>
                        <p class="txtcen" id="seconddisplay"></p>
                        <p class="txtcen"> <a href="/accounts/login/">Return to the Login Page Now </a> </p>
                        <div class="dropdown-divider"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
