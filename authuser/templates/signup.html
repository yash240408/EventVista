<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f9fc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        h2 {
            color: #333;
            text-align: center;
        }
        
        form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }
        
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
            color: #555;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="file"],
        select {
            width: calc(100% - 20px);
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .submit-container {
            text-align: center;
        }
        
        input[type="submit"] {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        
        input[type="submit"]:hover {
            background-color: #218838;
        }
        
        .login-options {
            text-align: center;
            margin-top: 20px;
        }
        
        .login-options a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            text-decoration: none;
            color: white;
            border-radius: 4px;
            font-size: 16px;
        }
        
        .login-options .google-login {
            background-color: #db4437;
        }
        
        .login-options .github-login {
            background-color: #333;
        }
        
        .error-message {
            color: red;
            text-align: center;
        }
    </style>
</head>

<body>
    <form action="/accounts/register/" method="post" enctype="multipart/form-data">
        <h2>User Registration</h2>
        {% csrf_token %}
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required><br>

        <label for="profile_picture">Profile Picture:</label>
        <input type="file" id="profile_picture" name="profile_picture" accept="image/*" required><br>

        <label for="role">Role:</label>
        <select id="role" name="role" required>
            <option value="" disabled selected>Select a role</option>
            <option value="attendee">Attendee</option>
            <option value="organizer">Organizer</option>
        </select><br>

        <div class="submit-container">
            <input type="submit" value="Submit">
        </div>

        <div class="login-options">
            <a href="/accounts/google/login" class="google-login">Sign Up with Google</a>
            <a href="/accounts/github/login" class="github-login">Sign Up with Github</a>
        </div>

        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}
    </form>
</body>

</html>
