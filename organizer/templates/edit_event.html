<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <div class="container">
        <h1>Edit Event</h1>
        <form action="{% url 'edit_event' event.id %}" method="post">
            {% csrf_token %}
            <label for="name">Event Name:</label>
            <input type="text" id="name" name="name" value="{{ event.name }}" required>

            <label for="description">Description:</label>
            <textarea id="description" name="description" required>{{ event.description }}</textarea>

            <label for="date">Date:</label>
            <input type="date" id="date" name="date" value="{{ event.date }}" required>

            <label for="time">Time:</label>
            <input type="time" id="time" name="time" value="{{ event.time }}" required>

            <label for="location">Location:</label>
            <input type="text" id="location" name="location" value="{{ event.location }}" required>

            <label for="categories">Categories:</label>
            <input type="text" id="categories" name="categories" value="{{ event.categories }}" required>

            <label for="ticket_type">Ticket Type:</label>
            <input type="text" id="ticket_type" name="ticket_type" value="{{ event.ticket_type }}" required>

            <label for="ticket_price">Ticket Price:</label>
            <input type="number" id="ticket_price" name="ticket_price" value="{{ event.ticket_price }}" required>

            <label for="ticket_quantity">Ticket Quantity:</label>
            <input type="number" id="ticket_quantity" name="ticket_quantity" value="{{ event.ticket_quantity }}" required>

            <button type="submit">Save Changes</button>
        </form>
    </div>
</body>
</html>
