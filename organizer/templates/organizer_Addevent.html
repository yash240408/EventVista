                <form action="/organizer/add_event/" method="post" enctype="multipart/form-data" id="eventForm">
                  {% csrf_token %}

                  <div class="form-group">
                    <label for="eventName">Event Name</label>
                    <input type="text" class="form-control" id="eventName" name="name" required>
                  </div>

                  <div class="form-group">
                    <label for="eventDescription">Description</label>
                    <textarea class="form-control" id="eventDescription" name="description" rows="4"
                      required></textarea>
                  </div>

                  <div class="form-row">
                    <div class="form-group col-md-6">
                      <label for="eventDate">Date</label>
                      <input type="date" class="form-control" id="eventDate" name="date" required>
                    </div>
                    <div class="form-group col-md-6">
                      <label for="eventTime">Time</label>
                      <input type="time" class="form-control" id="eventTime" name="time" required>
                    </div>
                  </div>

                  <div class="form-row">
                    <div class="form-group col-md-6">
                      <label for="eventCategories">Categories</label>
                      <select class="form-control" id="eventCategories" name="categories" required>
                        <option value="" disabled selected>Select category</option>
                        <option value="conference">Conference</option>
                        <option value="workshop">Workshop</option>
                        <option value="seminar">Seminar</option>
                        <option value="webinar">Webinar</option>
                      </select>
                    </div>
                    <div class="form-group col-md-6">
                      <label for="eventType">Ticket Type</label>
                      <select class="form-control" id="eventType" name="ticket_type" required>
                        <option value="" disabled selected>Select Ticket Type</option>
                        <option value="general">General Admission</option>
                        <option value="vip">VIP</option>
                      </select>
                    </div>
                  </div>

                  <div class="form-row">
                    <div class="form-group col-md-6">
                      <label for="eventPrice">Ticket Price</label>
                      <input type="number" class="form-control" id="eventPrice" name="ticket_price" min="1" required>
                    </div>
                    <div class="form-group col-md-6">
                      <label for="eventQuantity">Ticket Quantity</label>
                      <input type="number" class="form-control" id="eventQuantity" min="1" name="ticket_quantity"
                        required>
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="eventLocation">Event Location</label>
                    <textarea class="form-control" id="eventLocation" name="location" required></textarea>
                  </div>

                  <!-- File input for event_picture -->
                  <div class="form-group">
                    <label for="eventPicture">Event Picture</label>
                    <input type="file" class="form-control-file" id="eventPicture" name="event_picture" accept="image/*"
                      required>
                  </div>
                  <button type="submit" class="btn btn-primary btn-lg mx-auto d-block">Add Event</button>
                </form>


              </div>
              <!-- Event Form End -->

  <script>
    $('.select2').select2(
      {
        theme: 'bootstrap4',
      });
    $('.select2-multi').select2(
      {
        multiple: true,
        theme: 'bootstrap4',
      });
    $('.drgpicker').daterangepicker(
      {
        singleDatePicker: true,
        timePicker: false,
        showDropdowns: true,
        locale:
        {
          format: 'MM/DD/YYYY'
        }
      });
    $('.time-input').timepicker(
      {
        'scrollDefault': 'now',
        'zindex': '9999' /* fix modal open */
      });
    /** date range picker */
    if ($('.datetimes').length) {
      $('.datetimes').daterangepicker(
        {
          timePicker: true,
          startDate: moment().startOf('hour'),
          endDate: moment().startOf('hour').add(32, 'hour'),
          locale:
          {
            format: 'M/DD hh:mm A'
          }
        });
    }
    var start = moment().subtract(29, 'days');
    var end = moment();

    function cb(start, end) {
      $('#reportrange span').html(start.format('MMMM D, YYYY') + ' - ' + end.format('MMMM D, YYYY'));
    }
    $('#reportrange').daterangepicker(
      {
        startDate: start,
        endDate: end,
        ranges:
        {
          'Today': [moment(), moment()],
          'Yesterday': [moment().subtract(1, 'days'), moment().subtract(1, 'days')],
          'Last 7 Days': [moment().subtract(6, 'days'), moment()],
          'Last 30 Days': [moment().subtract(29, 'days'), moment()],
          'This Month': [moment().startOf('month'), moment().endOf('month')],
          'Last Month': [moment().subtract(1, 'month').startOf('month'), moment().subtract(1, 'month').endOf('month')]
        }
      }, cb);
    cb(start, end);
    $('.input-placeholder').mask("00/00/0000",
      {
        placeholder: "__/__/____"
      });
    $('.input-zip').mask('00000-000',
      {
        placeholder: "____-___"
      });
    $('.input-money').mask("#.##0,00",
      {
        reverse: true
      });
    $('.input-phoneus').mask('(000) 000-0000');
    $('.input-mixed').mask('AAA 000-S0S');
    $('.input-ip').mask('0ZZ.0ZZ.0ZZ.0ZZ',
      {
        translation:
        {
          'Z':
          {
            pattern: /[0-9]/,
            optional: true
          }
        },
        placeholder: "___.___.___.___"
      });
    // editor
    var editor = document.getElementById('editor');
    if (editor) {
      var toolbarOptions = [
        [
          {
            'font': []
          }],
        [
          {
            'header': [1, 2, 3, 4, 5, 6, false]
          }],
        ['bold', 'italic', 'underline', 'strike'],
        ['blockquote', 'code-block'],
        [
          {
            'header': 1
          },
          {
            'header': 2
          }],
        [
          {
            'list': 'ordered'
          },
          {
            'list': 'bullet'
          }],
        [
          {
            'script': 'sub'
          },
          {
            'script': 'super'
          }],
        [
          {
            'indent': '-1'
          },
          {
            'indent': '+1'
          }], // outdent/indent
        [
          {
            'direction': 'rtl'
          }], // text direction
        [
          {
            'color': []
          },
          {
            'background': []
          }], // dropdown with defaults from theme
        [
          {
            'align': []
          }],
        ['clean'] // remove formatting button
      ];
      var quill = new Quill(editor,
        {
          modules:
          {
            toolbar: toolbarOptions
          },
          theme: 'snow'
        });
    }
    // Example starter JavaScript for disabling form submissions if there are invalid fields
    (function () {
      'use strict';
      window.addEventListener('load', function () {
        // Fetch all the forms we want to apply custom Bootstrap validation styles to
        var forms = document.getElementsByClassName('needs-validation');
        // Loop over them and prevent submission
        var validation = Array.prototype.filter.call(forms, function (form) {
          form.addEventListener('submit', function (event) {
            if (form.checkValidity() === false) {
              event.preventDefault();
              event.stopPropagation();
            }
            form.classList.add('was-validated');
          }, false);
        });
      }, false);
    })();
  </script>

    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Get the current page URL
      var currentPage = window.location.pathname.split('/').pop();

      // Get all nav links
      var navLinks = document.querySelectorAll('.navbar-nav .nav-link');

      navLinks.forEach(function (link) {
        // Get the href attribute of the link
        var linkPath = new URL(link.href).pathname.split('/').pop();

        // Check if the href matches the current page URL
        if (linkPath === currentPage) {
          link.classList.add('active');
        }
      });
    });
  </script>
  <script>
    function toggleSidebar() {
      var sidebar = document.getElementById("sidebar");
      var main = document.getElementById("main");

      if (sidebar.style.width === "250px") {
        sidebar.style.width = "0";
        main.style.marginLeft = "0";
      } else {
        sidebar.style.width = "250px";
        main.style.marginLeft = "250px";
      }
    }
  </script>
